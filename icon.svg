<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep navy → cobalt → bright blue: full vertical depth -->
    <linearGradient id="bg" x1="0" y1="512" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0C2494"/>
      <stop offset="55%"  stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#4A7AF5"/>
    </linearGradient>
    <!-- Specular highlight: polished-glass feel, top-center glow -->
    <radialGradient id="shine" cx="50%" cy="-5%" r="65%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Edge vignette: subtle darkening gives depth and pop -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#shine)"/>
  <rect width="512" height="512" fill="url(#vignette)"/>

  <!-- Triangle ~38% of icon width — smaller, refined, with crossbar -->
  <path d="M256,135 L159,311 L353,311 Z"
    fill="none"
    stroke="#FFFFFF"
    stroke-opacity="0.96"
    stroke-width="22"
    stroke-linejoin="round"
    stroke-linecap="round"/>
  <!-- Crossbar at 75% height inside triangle -->
  <line x1="199" y1="267" x2="313" y2="267"
    stroke="#FFFFFF"
    stroke-opacity="0.96"
    stroke-width="22"
    stroke-linecap="round"/>
</svg>
